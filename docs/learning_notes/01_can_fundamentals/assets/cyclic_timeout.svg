<svg xmlns="http://www.w3.org/2000/svg" width="1150" height="470" viewBox="0 0 1150 470">
<defs><style>.title{font:700 24px Arial,sans-serif;fill:#111827}.sub{font:600 16px Arial,sans-serif;fill:#475569}.head{font:700 17px Arial,sans-serif;fill:#111827}.txt{font:14px Arial,sans-serif;fill:#374151}.axis{stroke:#374151;stroke-width:3}.tick{stroke:#64748b;stroke-width:2}.msg{fill:#e0f2fe;stroke:#0284c7;stroke-width:2}.fault{fill:#fee2e2;stroke:#dc2626;stroke-width:2}.ok{fill:#ecfdf5;stroke:#059669;stroke-width:2}</style></defs><rect width="100%" height="100%" fill="#ffffff"/>
<text x="575" y="32" text-anchor="middle" class="title">Cyclic Transmission and Timeout Monitoring</text><text x="575" y="56" text-anchor="middle" class="sub">Zyklische Übertragung und Timeout-Überwachung</text>
<line x1="100" y1="220" x2="1050" y2="220" class="axis"/><g class="tick"><line x1="160" y1="205" x2="160" y2="235"/><line x1="290" y1="205" x2="290" y2="235"/><line x1="420" y1="205" x2="420" y2="235"/><line x1="550" y1="205" x2="550" y2="235"/><line x1="680" y1="205" x2="680" y2="235"/><line x1="810" y1="205" x2="810" y2="235"/><line x1="940" y1="205" x2="940" y2="235"/></g>
<g class="txt" text-anchor="middle"><text x="160" y="264">0 ms</text><text x="290" y="264">100</text><text x="420" y="264">200</text><text x="550" y="264">300</text><text x="680" y="264">400</text><text x="810" y="264">500</text><text x="940" y="264">600</text></g>
<g><rect x="126" y="120" width="68" height="54" rx="8" class="msg"/><rect x="256" y="120" width="68" height="54" rx="8" class="msg"/><rect x="386" y="120" width="68" height="54" rx="8" class="msg"/></g><g class="head" text-anchor="middle"><text x="160" y="153">MSG</text><text x="290" y="153">MSG</text><text x="420" y="153">MSG</text></g>
<text x="550" y="142" class="txt">No further messages / Keine weiteren Nachrichten</text>
<rect x="390" y="305" width="390" height="95" rx="12" class="ok"/><text x="585" y="335" text-anchor="middle" class="head">Receiver waits for timeout threshold</text><text x="585" y="359" text-anchor="middle" class="txt">Empfänger wartet bis zur Timeout-Grenze</text><text x="585" y="383" text-anchor="middle" class="txt">Last valid message / Letzte gültige Nachricht: 200 ms</text>
<rect x="820" y="305" width="280" height="95" rx="12" class="fault"/><text x="960" y="335" text-anchor="middle" class="head">Fault becomes active</text><text x="960" y="359" text-anchor="middle" class="txt">Fehler wird aktiv</text><text x="960" y="383" text-anchor="middle" class="txt">Example / Beispiel: &gt; 500 ms missing</text>
</svg>