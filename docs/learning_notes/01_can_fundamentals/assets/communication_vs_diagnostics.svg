<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520">
<defs><style>.title{font:700 23px Arial,sans-serif;fill:#111827}.sub{font:600 16px Arial,sans-serif;fill:#475569}.head{font:700 18px Arial,sans-serif;fill:#111827}.txt{font:14px Arial,sans-serif;fill:#374151}.box{fill:#f8fafc;stroke:#475569;stroke-width:2}.bus{fill:#eef2ff;stroke:#6366f1;stroke-width:2}.arrow{stroke:#475569;stroke-width:3}</style></defs><rect width="100%" height="100%" fill="#ffffff"/>
<text x="600" y="32" text-anchor="middle" class="title">Vehicle Communication and Diagnostics Can Share the Same CAN Bus</text><text x="600" y="56" text-anchor="middle" class="sub">Fahrzeugkommunikation und Diagnose können denselben CAN-Bus verwenden</text>
<rect x="60" y="100" width="450" height="300" rx="14" class="box"/><text x="285" y="134" text-anchor="middle" class="head">Operational vehicle communication</text><text x="285" y="158" text-anchor="middle" class="txt">Betriebliche Fahrzeugkommunikation</text><text x="95" y="205" class="txt">• Vehicle speed / Fahrzeuggeschwindigkeit</text><text x="95" y="238" class="txt">• Brake status / Bremsstatus</text><text x="95" y="271" class="txt">• Steering angle / Lenkwinkel</text><text x="95" y="304" class="txt">• Battery state of charge / Ladezustand</text><text x="95" y="337" class="txt">• Often cyclic or event-based</text><text x="95" y="365" class="txt">  Häufig zyklisch oder ereignisgesteuert</text>
<rect x="690" y="100" width="450" height="300" rx="14" class="box"/><text x="915" y="134" text-anchor="middle" class="head">Diagnostic communication</text><text x="915" y="158" text-anchor="middle" class="txt">Diagnosekommunikation</text><text x="725" y="205" class="txt">• Read or clear DTCs / DTCs lesen oder löschen</text><text x="725" y="238" class="txt">• Read ECU identification / ECU-Daten lesen</text><text x="725" y="271" class="txt">• Run routines / Diagnoseroutinen ausführen</text><text x="725" y="304" class="txt">• Reprogram an ECU / Steuergerät programmieren</text><text x="725" y="337" class="txt">• Example protocol / Beispielprotokoll: UDS</text>
<rect x="435" y="440" width="330" height="62" rx="12" class="bus"/><text x="600" y="467" text-anchor="middle" class="head">CAN as transport/network</text><text x="600" y="490" text-anchor="middle" class="txt">CAN als Transport- bzw. Netzwerkprotokoll</text><line x1="285" y1="400" x2="490" y2="440" class="arrow"/><line x1="915" y1="400" x2="710" y2="440" class="arrow"/>
</svg>