<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="500" viewBox="0 0 1100 500">
<defs><style>
.title{font:700 25px Arial,sans-serif;fill:#111827}.sub{font:600 16px Arial,sans-serif;fill:#475569}.label{font:600 17px Arial,sans-serif;fill:#111827}.small{font:15px Arial,sans-serif;fill:#374151}.box{fill:#f8fafc;stroke:#475569;stroke-width:2}.busH{stroke:#1f2937;stroke-width:6}.busL{stroke:#64748b;stroke-width:6}.tap{stroke:#475569;stroke-width:3}.term{fill:#fff;stroke:#111827;stroke-width:2}.note{fill:#eef2ff;stroke:#6366f1;stroke-width:1.5}
</style></defs><rect width="100%" height="100%" fill="#ffffff"/>
<text x="550" y="34" text-anchor="middle" class="title">Simplified High-Speed CAN Network</text>
<text x="550" y="58" text-anchor="middle" class="sub">Vereinfachtes High-Speed-CAN-Netzwerk</text>
<line x1="140" y1="205" x2="960" y2="205" class="busH"/><line x1="140" y1="255" x2="960" y2="255" class="busL"/>
<text x="550" y="190" text-anchor="middle" class="label">CAN_H</text><text x="550" y="286" text-anchor="middle" class="label">CAN_L</text>
<rect x="90" y="185" width="50" height="90" rx="8" class="term"/><text x="115" y="224" text-anchor="middle" class="label">120</text><text x="115" y="248" text-anchor="middle" class="small">Ω</text>
<rect x="960" y="185" width="50" height="90" rx="8" class="term"/><text x="985" y="224" text-anchor="middle" class="label">120</text><text x="985" y="248" text-anchor="middle" class="small">Ω</text>
<line x1="300" y1="205" x2="300" y2="120" class="tap"/><line x1="300" y1="255" x2="300" y2="120" class="tap"/>
<rect x="190" y="75" width="220" height="72" rx="10" class="box"/><text x="300" y="105" text-anchor="middle" class="label">Brake ECU</text><text x="300" y="130" text-anchor="middle" class="small">Bremssteuergerät</text>
<line x1="550" y1="205" x2="550" y2="385" class="tap"/><line x1="550" y1="255" x2="550" y2="385" class="tap"/>
<rect x="435" y="370" width="230" height="72" rx="10" class="box"/><text x="550" y="400" text-anchor="middle" class="label">Gateway ECU</text><text x="550" y="425" text-anchor="middle" class="small">Gateway-Steuergerät</text>
<line x1="800" y1="205" x2="800" y2="120" class="tap"/><line x1="800" y1="255" x2="800" y2="120" class="tap"/>
<rect x="690" y="75" width="220" height="72" rx="10" class="box"/><text x="800" y="105" text-anchor="middle" class="label">Cluster ECU</text><text x="800" y="130" text-anchor="middle" class="small">Kombiinstrument-Steuergerät</text>
<rect x="730" y="355" width="310" height="92" rx="10" class="note"/><text x="885" y="382" text-anchor="middle" class="small">All nodes share the bus.</text><text x="885" y="405" text-anchor="middle" class="small">Alle Knoten nutzen denselben Bus.</text><text x="885" y="428" text-anchor="middle" class="small">Receivers filter messages by ID.</text>
</svg>