<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430">
<defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#374151"/></marker><style>
.title{font:700 24px Arial,sans-serif;fill:#111827}.sub{font:600 16px Arial,sans-serif;fill:#475569}.head{font:700 17px Arial,sans-serif;fill:#111827}.body{font:14px Arial,sans-serif;fill:#374151}.box{fill:#f8fafc;stroke:#475569;stroke-width:2}.arrow{stroke:#374151;stroke-width:3;marker-end:url(#arrow)}.mini{fill:#eef2ff;stroke:#6366f1;stroke-width:1.5}
</style></defs><rect width="100%" height="100%" fill="#ffffff"/>
<text x="600" y="32" text-anchor="middle" class="title">From Vehicle Information to Bits on the CAN Bus</text><text x="600" y="56" text-anchor="middle" class="sub">Von der Fahrzeuginformation zu den Bits auf dem CAN-Bus</text>
<rect x="35" y="125" width="220" height="145" rx="12" class="box"/><text x="145" y="158" text-anchor="middle" class="head">Physical value</text><text x="145" y="181" text-anchor="middle" class="body">Physikalischer Wert</text><text x="145" y="216" text-anchor="middle" class="body">Vehicle speed / Fahrzeuggeschwindigkeit</text><text x="145" y="243" text-anchor="middle" class="body">123.45 km/h</text>
<line x1="255" y1="198" x2="315" y2="198" class="arrow"/>
<rect x="320" y="125" width="220" height="145" rx="12" class="box"/><text x="430" y="158" text-anchor="middle" class="head">CAN signal / CAN-Signal</text><text x="430" y="200" text-anchor="middle" class="body">Raw value / Rohwert = 12345</text><text x="430" y="229" text-anchor="middle" class="body">Factor / Faktor = 0.01</text>
<line x1="540" y1="198" x2="600" y2="198" class="arrow"/>
<rect x="605" y="103" width="250" height="190" rx="12" class="box"/><text x="730" y="136" text-anchor="middle" class="head">CAN message / CAN-Nachricht</text><rect x="635" y="157" width="190" height="30" rx="5" class="mini"/><text x="730" y="178" text-anchor="middle" class="body">VehicleSpeed</text><rect x="635" y="198" width="190" height="30" rx="5" class="mini"/><text x="730" y="219" text-anchor="middle" class="body">BrakePressed</text><rect x="635" y="239" width="190" height="30" rx="5" class="mini"/><text x="730" y="260" text-anchor="middle" class="body">MotorTemperature</text>
<line x1="855" y1="198" x2="915" y2="198" class="arrow"/>
<rect x="920" y="125" width="245" height="145" rx="12" class="box"/><text x="1042" y="158" text-anchor="middle" class="head">CAN frame / CAN-Frame</text><text x="1042" y="203" text-anchor="middle" class="body">Identifier + payload / Nutzdaten</text><text x="1042" y="232" text-anchor="middle" class="body">+ CRC + ACK ...</text>
<text x="600" y="350" text-anchor="middle" class="body">The DBC describes how signals are packed into and decoded from the payload.</text><text x="600" y="376" text-anchor="middle" class="body">Die DBC beschreibt, wie Signale in die Nutzdaten gepackt und daraus dekodiert werden.</text>
</svg>