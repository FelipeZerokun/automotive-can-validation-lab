<svg xmlns="http://www.w3.org/2000/svg" width="1150" height="560" viewBox="0 0 1150 560">
<defs><style>.title{font:700 24px Arial,sans-serif;fill:#111827}.sub{font:600 16px Arial,sans-serif;fill:#475569}.head{font:700 17px Arial,sans-serif;fill:#111827}.txt{font:14px Arial,sans-serif;fill:#374151}.bit{font:700 22px 'Courier New',monospace;fill:#111827}.grid{stroke:#94a3b8;stroke-width:1}.win{fill:#ecfdf5;stroke:#059669;stroke-width:2}.lose{fill:#fff7ed;stroke:#ea580c;stroke-width:2}.dom{fill:#e2e8f0}.rec{fill:#fff}</style></defs><rect width="100%" height="100%" fill="#ffffff"/>
<text x="575" y="32" text-anchor="middle" class="title">Simplified Bitwise Arbitration</text><text x="575" y="56" text-anchor="middle" class="sub">Vereinfachte bitweise Arbitrierung</text>
<text x="55" y="105" class="head">Identifier bits / Identifier-Bits</text><text x="55" y="148" class="head">Node A / Knoten A — ID 0x100</text><text x="55" y="203" class="head">Node B / Knoten B — ID 0x120</text><text x="55" y="258" class="head">Observed bus / Buszustand</text>
<g transform="translate(360,115)"><rect x="0" y="0" width="58" height="45" class="dom"/><rect x="58" y="0" width="58" height="45" class="dom"/><rect x="116" y="0" width="58" height="45" class="rec"/><rect x="174" y="0" width="58" height="45" class="dom"/><rect x="232" y="0" width="58" height="45" class="dom"/><rect x="290" y="0" width="58" height="45" class="dom"/>
<rect x="0" y="55" width="58" height="45" class="dom"/><rect x="58" y="55" width="58" height="45" class="dom"/><rect x="116" y="55" width="58" height="45" class="rec"/><rect x="174" y="55" width="58" height="45" class="dom"/><rect x="232" y="55" width="58" height="45" class="dom"/><rect x="290" y="55" width="58" height="45" class="rec"/>
<rect x="0" y="110" width="58" height="45" class="dom"/><rect x="58" y="110" width="58" height="45" class="dom"/><rect x="116" y="110" width="58" height="45" class="rec"/><rect x="174" y="110" width="58" height="45" class="dom"/><rect x="232" y="110" width="58" height="45" class="dom"/><rect x="290" y="110" width="58" height="45" class="dom"/>
<g class="bit" text-anchor="middle"><text x="29" y="30">0</text><text x="87" y="30">0</text><text x="145" y="30">1</text><text x="203" y="30">0</text><text x="261" y="30">0</text><text x="319" y="30">0</text><text x="29" y="85">0</text><text x="87" y="85">0</text><text x="145" y="85">1</text><text x="203" y="85">0</text><text x="261" y="85">0</text><text x="319" y="85">1</text><text x="29" y="140">0</text><text x="87" y="140">0</text><text x="145" y="140">1</text><text x="203" y="140">0</text><text x="261" y="140">0</text><text x="319" y="140">0</text></g>
<g class="grid"><line x1="0" y1="0" x2="348" y2="0"/><line x1="0" y1="45" x2="348" y2="45"/><line x1="0" y1="55" x2="348" y2="55"/><line x1="0" y1="100" x2="348" y2="100"/><line x1="0" y1="110" x2="348" y2="110"/><line x1="0" y1="155" x2="348" y2="155"/><line x1="0" y1="0" x2="0" y2="155"/><line x1="58" y1="0" x2="58" y2="155"/><line x1="116" y1="0" x2="116" y2="155"/><line x1="174" y1="0" x2="174" y2="155"/><line x1="232" y1="0" x2="232" y2="155"/><line x1="290" y1="0" x2="290" y2="155"/><line x1="348" y1="0" x2="348" y2="155"/></g><text x="319" y="190" text-anchor="middle" class="head">Decision bit / Entscheidungsbit</text></g>
<rect x="95" y="375" width="430" height="110" rx="12" class="win"/><text x="310" y="408" text-anchor="middle" class="head">Node A continues / Knoten A sendet weiter</text><text x="310" y="441" text-anchor="middle" class="txt">Dominant 0 sent and dominant 0 observed.</text><text x="310" y="465" text-anchor="middle" class="txt">Dominante 0 gesendet und dominante 0 gelesen.</text>
<rect x="625" y="375" width="430" height="110" rx="12" class="lose"/><text x="840" y="408" text-anchor="middle" class="head">Node B stops / Knoten B stoppt</text><text x="840" y="441" text-anchor="middle" class="txt">Recessive 1 sent, but dominant 0 observed.</text><text x="840" y="465" text-anchor="middle" class="txt">Rezessive 1 gesendet, aber dominante 0 gelesen.</text>
<text x="575" y="525" text-anchor="middle" class="txt">Dominant 0 overrides recessive 1; the lower numerical identifier normally wins.</text><text x="575" y="547" text-anchor="middle" class="txt">Dominant 0 überschreibt rezessiv 1; normalerweise gewinnt der kleinere numerische Identifier.</text>
</svg>